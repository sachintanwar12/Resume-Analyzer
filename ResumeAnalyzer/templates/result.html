<!DOCTYPE html>
<html>
<head>
    <title>Result</title>
</head>
<body>

<h1>Analysis Result</h1>

<p>Resume Score: {{ score }}%</p>

<p>Skills Found:</p>
<ul>

{% endfor %}
</ul>

<p>Missing Skills:</p>
<ul>
{% for skill in missing %}
<li>{{ skill }}</li>
{% endfor %}
</ul>

<a href="/">Back</a>

</body>
</html>
